<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | Varcoe Cybersecurity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0f19;--text:#e8e9ed;--text2:#8a8f9e;--text3:#555a68;--gold:#c4a265;--gold-light:#d8bc8a;--border:rgba(255,255,255,.06);--font:'Inter',system-ui,sans-serif;--serif:'Cormorant Garamond','Georgia',serif;--ease:cubic-bezier(.22,1,.36,1)}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;overflow:hidden;position:relative}
body::before{content:'';position:absolute;top:20%;left:50%;width:600px;height:600px;background:radial-gradient(circle,rgba(196,162,101,.04) 0%,transparent 60%);transform:translateX(-50%);pointer-events:none}
.code{font-family:var(--serif);font-size:clamp(100px,20vw,200px);font-weight:300;color:var(--text);letter-spacing:-4px;line-height:1;margin-bottom:16px;position:relative;opacity:0;animation:fadeUp .8s .2s var(--ease) forwards}
.code span{color:var(--gold);font-style:italic}
.msg{font-family:var(--serif);font-size:clamp(20px,3vw,32px);font-weight:400;color:var(--text2);margin-bottom:12px;opacity:0;animation:fadeUp .8s .4s var(--ease) forwards}
.sub{font-size:14px;color:var(--text3);line-height:1.8;max-width:400px;margin-bottom:48px;opacity:0;animation:fadeUp .8s .6s var(--ease) forwards}
.back{display:inline-flex;align-items:center;gap:8px;padding:16px 36px;font-family:var(--font);font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;background:var(--gold);color:var(--bg);text-decoration:none;transition:all .3s;opacity:0;animation:fadeUp .8s .8s var(--ease) forwards}
.back:hover{background:var(--gold-light);box-shadow:0 4px 24px rgba(196,162,101,.15)}
.brand{position:absolute;top:32px;left:50%;transform:translateX(-50%);font-family:var(--serif);font-size:18px;font-weight:500;letter-spacing:1px;color:var(--text);display:flex;align-items:center;gap:8px;text-decoration:none;opacity:0;animation:fadeUp .8s .1s var(--ease) forwards}
.brand i{font-style:normal;width:26px;height:26px;background:var(--gold);color:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;font-family:var(--font)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
/* Subtle grid lines */
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:80px 80px;opacity:.3;pointer-events:none}
</style>
</head>
<body>

<p class="sub">The resource you're looking for doesn't exist or has been moved. If you believe this is an error, contact us directly.</p>

</body>
</html>

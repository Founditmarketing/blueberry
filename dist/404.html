<script>
(function(){
  var dds=document.querySelectorAll('.nav-dd');
  dds.forEach(function(dd){
    var mega=dd.querySelector('.mega');
    if(!mega)return;
    var t=null;
    function open(){
      clearTimeout(t);
      dds.forEach(function(o){if(o!==dd){o.classList.remove('dd-active');var m=o.querySelector('.mega');if(m)m.classList.remove('mega-open');}});
      dd.classList.add('dd-active');
      mega.classList.add('mega-open');
    }
    function close(){
      clearTimeout(t);
      t=setTimeout(function(){dd.classList.remove('dd-active');mega.classList.remove('mega-open');},200);
    }
    dd.addEventListener('mouseenter',open);
    dd.addEventListener('mouseleave',close);
    mega.addEventListener('mouseenter',function(){clearTimeout(t);});
    mega.addEventListener('mouseleave',close);
  });
  document.addEventListener('click',function(e){
    if(!e.target.closest('.nav-dd')&&!e.target.closest('.mega')){
      dds.forEach(function(d){d.classList.remove('dd-active');});
      document.querySelectorAll('.mega').forEach(function(m){m.classList.remove('mega-open');});
    }
  });
})();
</script>

<script id="nav-controller">

      if(!isOpen&&sub){sub.classList.add('mm-sub-open');btn.classList.add('mm-open');}
    });
  });

  // Desktop mega menu
  var dds=document.querySelectorAll('.nav-dd');

    dd.addEventListener('mouseleave',function(){t=setTimeout(function(){dd.classList.remove('dd-active');mega.classList.remove('mega-open');},200);});
    mega.addEventListener('mouseenter',function(){clearTimeout(t);});

  });
  document.addEventListener('click',function(e){if(!e.target.closest('.nav-dd')&&!e.target.closest('.mega')){dds.forEach(function(d){d.classList.remove('dd-active');});document.querySelectorAll('.mega').forEach(function(m){m.classList.remove('mega-open');});}});
})();
</script>
